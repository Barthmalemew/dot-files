COMMON_FLAGS="-march=arrowlake-s -O2 -pipe -flto=auto"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
LDFLAGS="-Wl,-O1 -Wl,--as-needed -Wl,-z,pack-relative-relocs -flto=auto"
MAKEOPTS="-j8 -l8"

EMERGE_DEFAULT_OPTS="--jobs=3 --load-average=8 --keep-going --with-bdeps=y"

LC_MESSAGES=C
L10N="en en-US"
LINGUAS="en en_US"

USE="-systemd udev elogind dbus policykit networkmanager bluetooth git wayland pipewire pulseaudio
  screencast vulkan vaapi acpi upower udisks lto dist-kernel -gtk -gnome -kde"

CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1
  sse4_2 ssse3 vpclmulqdq"

VIDEO_CARDS="intel"
INPUT_DEVICES="libinput"

ACCEPT_LICENSE="*"

FEATURES="buildpkg binpkg-multi-instance parallel-fetch parallel-install"
