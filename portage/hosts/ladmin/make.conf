COMMON_FLAGS="-march=native -O2 -pipe -flto=auto"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
LDFLAGS="-Wl,-O1 -Wl,--as-needed -flto=auto"
MAKEOPTS="-j16 -l14"

EMERGE_DEFAULT_OPTS="--jobs=4 --load-average=14 --keep-going --with-bdeps=y"

LC_MESSAGES=C
L10N="en en-US"
LINGUAS="en en_US"

USE="-systemd lto udev elogind dbus policykit networkmanager bluetooth git wayland pipewire
  screencast pulseaudio vulkan vaapi dist-kernel -gtk -gnome -kde"

CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1
  sse4_2 sse4a ssse3 vpclmulqdq"

VIDEO_CARDS="amdgpu radeonsi"
INPUT_DEVICES="libinput"

ACCEPT_LICENSE="*"

FEATURES="buildpkg binpkg-multi-instance parallel-fetch parallel-install"
