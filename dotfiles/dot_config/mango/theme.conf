# Gruvbox/Quickshell-aligned Mango visuals.
borderpx=2
focuscolor=0xd79921ff
bordercolor=0x50494566
border_radius=8
no_radius_when_single=0

# Keep compositor effects restrained: no blur, shadows, or transparency.
blur=0
blur_layer=0
blur_optimized=1
shadows=0
layer_shadows=0
shadow_only_floating=1
focused_opacity=1.0
unfocused_opacity=1.0

# Fast, subtle window/layer motion.
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
layer_animation_type_open=fade
layer_animation_type_close=fade
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=180
animation_duration_open=160
animation_duration_tag=160
animation_duration_close=140
animation_duration_focus=120
animation_curve_open=0.215,0.61,0.355,1
animation_curve_move=0.215,0.61,0.355,1
animation_curve_tag=0.215,0.61,0.355,1
animation_curve_close=0.215,0.61,0.355,1
animation_curve_focus=0.215,0.61,0.355,1
animation_curve_opafadein=0.215,0.61,0.355,1
animation_curve_opafadeout=0.215,0.61,0.355,1
