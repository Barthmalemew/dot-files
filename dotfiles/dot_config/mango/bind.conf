# --- apps ---
bind=SUPER,Return,spawn,kitty
bind=SUPER,D,spawn,qs ipc call launcher toggle
bind=SUPER+SHIFT,N,spawn,qs ipc call notifications toggle

# --- window ---
bind=SUPER+SHIFT,q,killclient,
bind=SUPER,F,togglemaximizescreen

# --- session ---
bind=SUPER+SHIFT,E,spawn,qs ipc call powerMenu toggle
bind=SUPER+SHIFT,Z,reload_config,
bind=SUPER+SHIFT,S,spawn,~/.config/quickshell/scripts/take-screenshot.sh

# --- focus (vim) ---
bind=SUPER,H,focusdir,left
bind=SUPER,L,focusdir,right
bind=SUPER,K,focusdir,up
bind=SUPER,J,focusdir,down

# --- move window ---
bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,L,exchange_client,right
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,J,exchange_client,down

# --- resize window ---
bind=SUPER+CTRL,H,resizewin,-50,+0
bind=SUPER+CTRL,L,resizewin,+50,+0
bind=SUPER+CTRL,K,resizewin,+0,-50
bind=SUPER+CTRL,J,resizewin,+0,+50

# --- layout switch (per-tag, remembered) ---
bind=SUPER+SHIFT,R,setlayout,scroller
bind=SUPER+SHIFT,Y,setlayout,vertical_scroller
bind=SUPER+SHIFT,T,setlayout,tile

# --- DP-1 / main monitor workspaces ---
bind=SUPER,1,spawn,~/.config/quickshell/scripts/view-workspace.sh 1 DP-1
bind=SUPER,2,spawn,~/.config/quickshell/scripts/view-workspace.sh 2 DP-1
bind=SUPER,3,spawn,~/.config/quickshell/scripts/view-workspace.sh 3 DP-1
bind=SUPER,4,spawn,~/.config/quickshell/scripts/view-workspace.sh 4 DP-1
bind=SUPER,5,spawn,~/.config/quickshell/scripts/view-workspace.sh 5 DP-1
bind=SUPER,6,spawn,~/.config/quickshell/scripts/view-workspace.sh 6 DP-1
bind=SUPER,7,spawn,~/.config/quickshell/scripts/view-workspace.sh 7 DP-1

# --- DP-2 / vertical monitor workspaces ---
bind=SUPER,8,spawn,~/.config/quickshell/scripts/view-workspace.sh 8 DP-2
bind=SUPER,9,spawn,~/.config/quickshell/scripts/view-workspace.sh 9 DP-2

# --- send window to tag ---
bind=SUPER+SHIFT,1,tagcrossmon,1,DP-1
bind=SUPER+SHIFT,2,tagcrossmon,2,DP-1
bind=SUPER+SHIFT,3,tagcrossmon,3,DP-1
bind=SUPER+SHIFT,4,tagcrossmon,4,DP-1
bind=SUPER+SHIFT,5,tagcrossmon,5,DP-1
bind=SUPER+SHIFT,6,tagcrossmon,6,DP-1
bind=SUPER+SHIFT,7,tagcrossmon,7,DP-1
bind=SUPER+SHIFT,8,tagcrossmon,8,DP-2
bind=SUPER+SHIFT,9,tagcrossmon,9,DP-2

# --- mouse wheels ---

# SUPER + horizontal wheel: focus through horizontal scroller
axisbind=SUPER,LEFT,focusdir,left
axisbind=SUPER,RIGHT,focusdir,right

# SUPER + vertical wheel: focus through vertical scroller
axisbind=SUPER,UP,focusdir,up
axisbind=SUPER,DOWN,focusdir,down

# SUPER + SHIFT + either wheel: disabled (requested)

# --- mouse drag move/resize ---
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
