# pull in the rest
source=~/.config/mango/bind.conf
# Desktop-only monitor placement is kept as a commented reference in
# monitor.conf so the shared config stays laptop-safe.
# source=~/.config/mango/monitor.conf
source=~/.config/mango/rule.conf

# keyboard
xkb_rules_layout=us
repeat_rate=50
repeat_delay=300

# appearance
borderpx=2
focuscolor=0xc9b890ff
bordercolor=0x444444ff
gappih=6
gappiv=6
gappoh=6
gappov=6

# tile default
windowrule=isfloating:0,appid:.*
drag_tile_to_tile=1
new_is_master=1
default_mfact=0.55
default_nmaster=1

# scroller defaults
scroller_default_proportion=0.5
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.33,0.5,0.66,1.0
scroller_prefer_center=1

# mango 0.12.8 rejects enable_hotkeys as an unknown keyword.
# enable_hotkeys=1

windowrule=allow_csd:0,appid:.*[Bb]rave.*
export QT_QPA_PLATFORMTHEME=qt6ct
export QT_STYLE_OVERRIDE=Fusion
export QT_QUICK_CONTROLS_STYLE=Material
export QT_QUICK_CONTROLS_MATERIAL_THEME=Dark
export GTK_THEME=Adwaita:dark
exec-once=/usr/libexec/xdg-desktop-portal-wlr
exec-once=qs --no-duplicate -p ~/.config/quickshell/shell.qml
exec-once=~/.config/quickshell/scripts/lock-after-startup.sh
