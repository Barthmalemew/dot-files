# Laptop internal display: 14" 2880x1800 panel needs compositor scaling so
# text and UI are not tiny.
monitorrule=name:^eDP-1$,width:2880,height:1800,x:0,y:0,scale:1.4,vrr:0,rr:0

# Desktop-only monitor placement, disabled for shared laptop-safe setup.
# Uncomment on ladmin if this exact monitor layout should be applied.
#
# DP-1 = Dell G2724D, landscape, high refresh
# monitorrule=name:^DP-1$,width:2560,height:1440,refresh:165,x:0,y:830,scale:1,vrr:0,rr:0
#
# DP-2 = Lenovo P27q-20, portrait, 60Hz, to the right
# monitorrule=name:^DP-2$,width:2560,height:1440,refresh:60,x:2560,y:0,scale:1,vrr:0,rr:1
