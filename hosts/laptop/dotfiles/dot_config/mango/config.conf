# pull in the rest
source=~/.config/mango/bind.conf
source=~/.config/mango/monitor.conf
source=~/.config/mango/rule.conf
source=~/.config/mango/theme.conf

# keyboard
xkb_rules_layout=us
repeat_rate=50
repeat_delay=300

# cursor
cursor_size=28
cursor_theme=Adwaita

# trackpad
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
disable_while_typing=1
trackpad_natural_scrolling=1
scroll_method=1
click_method=2

gappih=6
gappiv=6
gappoh=6
gappov=6

# tile default
windowrule=isfloating:0,appid:.*
drag_tile_to_tile=1
new_is_master=1
default_mfact=0.55
default_nmaster=1

# scroller defaults
scroller_default_proportion=0.5
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.33,0.5,0.66,1.0
scroller_prefer_center=1

# mango 0.12.8 rejects enable_hotkeys as an unknown keyword.
# enable_hotkeys=1

windowrule=allow_csd:0,appid:.*[Bb]rave.*
# Mango 0.12.8 config does not accept shell-style export statements.
# Set toolkit theme variables in the login environment instead.
# QT_QPA_PLATFORMTHEME=qt6ct
# QT_STYLE_OVERRIDE=Fusion
# QT_QUICK_CONTROLS_STYLE=Material
# QT_QUICK_CONTROLS_MATERIAL_THEME=Dark
# GTK_THEME=Adwaita:dark
exec-once=lxqt-policykit-agent
exec-once=swaybg -i ~/Pictures/Wallpapers/sunset.png -m fill
exec-once=qs --no-duplicate -p ~/.config/quickshell/shell.qml
exec-once=~/.config/quickshell/scripts/lock-after-startup.sh
exec-once=~/.config/quickshell/scripts/sleep-lock-watcher.sh
